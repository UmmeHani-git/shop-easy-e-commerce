global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'product-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['PRODUCT_TARGET']
        labels:
          service: product-service

  - job_name: 'order-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['ORDER_TARGET']
        labels:
          service: order-service
