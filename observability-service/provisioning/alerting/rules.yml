apiVersion: 1
groups:
  - orgId: 1
    name: ShopEasy Alerts
    folder: ShopEasy
    interval: 1m
    rules:
      - uid: failed-orders-alert
        title: High Failed Orders
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: orders_failed_total
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: []
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [B]
                  reducer:
                    params: []
                    type: last
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    params: []
                    type: last
              expression: B
              refId: C
              type: threshold
        for: 1m
        labels:
          severity: critical
          team: shop-easy
        annotations:
          summary: "Failed orders exceeded threshold (>5)"
          description: "Total failed orders: {{ $values.B }}. Investigate payment failures immediately."
