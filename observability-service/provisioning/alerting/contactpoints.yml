apiVersion: 1
contactPoints:
  - orgId: 1
    name: PagerDuty
    receivers:
      - uid: pagerduty-1
        type: pagerduty
        settings:
          integrationKey: ${PAGERDUTY_INTEGRATION_KEY}
          severity: critical
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: PagerDuty
    group_by: ['alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
