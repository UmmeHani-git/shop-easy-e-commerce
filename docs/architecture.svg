<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#64748b"/></marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#10b981"/></marker>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#1a1a2e"/><stop offset="100%" style="stop-color:#0f3460"/></linearGradient>
  </defs>

  <rect width="1100" height="750" fill="#f8fafc" rx="12"/>
  <text x="550" y="35" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Shop Easy — End-to-End Architecture</text>

  <!-- CI/CD Pipeline Section -->
  <rect x="20" y="55" width="1060" height="110" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="40" y="75" font-size="11" font-weight="700" fill="#166534">CI/CD PIPELINE</text>

  <!-- Developer -->
  <rect x="40" y="85" width="110" height="65" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="95" y="110" text-anchor="middle" font-size="22">👨‍💻</text>
  <text x="95" y="130" text-anchor="middle" font-size="9" fill="#374151">Developer</text>
  <text x="95" y="142" text-anchor="middle" font-size="8" fill="#6b7280">git push main</text>

  <line x1="150" y1="117" x2="185" y2="117" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- GitHub Actions -->
  <rect x="185" y="85" width="140" height="65" rx="8" fill="white" stroke="#24292f" stroke-width="1.5"/>
  <text x="255" y="107" text-anchor="middle" font-size="10" font-weight="600" fill="#24292f">⚡ GitHub Actions</text>
  <text x="255" y="122" text-anchor="middle" font-size="8" fill="#6b7280">Build → Push → Deploy</text>
  <text x="255" y="135" text-anchor="middle" font-size="8" fill="#6b7280">Terraform → DB Init</text>
  <text x="255" y="148" text-anchor="middle" font-size="8" fill="#6b7280">1-click workflow</text>

  <line x1="325" y1="105" x2="365" y2="105" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="325" y1="130" x2="365" y2="130" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S3 State -->
  <rect x="365" y="85" width="120" height="28" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="425" y="104" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">🪣 S3 Terraform State</text>

  <!-- ECR -->
  <rect x="365" y="118" width="120" height="28" rx="6" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="425" y="137" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">📦 Amazon ECR</text>

  <!-- Images list -->
  <rect x="510" y="85" width="150" height="65" rx="8" fill="white" stroke="#f59e0b"/>
  <text x="585" y="102" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">Docker Images (amd64)</text>
  <text x="585" y="116" text-anchor="middle" font-size="8" fill="#6b7280">• product-service</text>
  <text x="585" y="128" text-anchor="middle" font-size="8" fill="#6b7280">• order-service</text>
  <text x="585" y="140" text-anchor="middle" font-size="8" fill="#6b7280">• frontend + db-init</text>

  <line x1="485" y1="132" x2="510" y2="120" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrO)"/>

  <!-- AWS Cloud Section -->
  <rect x="20" y="180" width="1060" height="550" rx="12" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,4"/>
  <rect x="35" y="172" width="100" height="20" fill="#f8fafc"/>
  <text x="85" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">☁️ AWS Cloud</text>

  <!-- VPC -->
  <rect x="40" y="200" width="1020" height="510" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="70" y="218" font-size="10" font-weight="600" fill="#1d4ed8">VPC 10.0.0.0/16</text>

  <!-- Public Subnets -->
  <rect x="60" y="230" width="980" height="460" rx="8" fill="#f0fdf4" stroke="#86efac"/>
  <text x="80" y="248" font-size="9" font-weight="600" fill="#166534">Public Subnets (10.0.1.0/24, 10.0.2.0/24)</text>

  <!-- User -->
  <rect x="700" y="55" width="120" height="65" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="760" y="82" text-anchor="middle" font-size="22">🌐</text>
  <text x="760" y="100" text-anchor="middle" font-size="9" fill="#374151">Users / Browser</text>
  <text x="760" y="112" text-anchor="middle" font-size="8" fill="#6b7280">HTTP port 80</text>

  <!-- Arrow User to ALB -->
  <line x1="760" y1="120" x2="760" y2="258" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ALB -->
  <rect x="610" y="260" width="300" height="80" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="760" y="283" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e0b">⚖️ Application Load Balancer</text>
  <text x="760" y="300" text-anchor="middle" font-size="9" fill="#374151">shop-easy-alb (port 80)</text>
  <text x="680" y="318" font-size="8" fill="#6b7280">/products*, /cart* → Product Service</text>
  <text x="680" y="330" font-size="8" fill="#6b7280">/orders*, /payments* → Order Service</text>
  <text x="680" y="342" font-size="8" fill="#6b7280">/* → Frontend</text>

  <!-- ECS Cluster -->
  <rect x="80" y="370" width="640" height="300" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="100" y="392" font-size="11" font-weight="700" fill="#f59e0b">🐳 ECS Fargate Cluster (shop-easy-cluster)</text>

  <!-- Product Service -->
  <rect x="100" y="410" width="190" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="195" y="432" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Product Service</text>
  <text x="195" y="448" text-anchor="middle" font-size="9" fill="#374151">Node.js :4001</text>
  <text x="195" y="465" text-anchor="middle" font-size="8" fill="#6b7280">GET /products</text>
  <text x="195" y="477" text-anchor="middle" font-size="8" fill="#6b7280">GET/POST /cart</text>
  <text x="195" y="489" text-anchor="middle" font-size="8" fill="#6b7280">DELETE /cart/:id</text>
  <text x="195" y="505" text-anchor="middle" font-size="8" fill="#10b981">assign_public_ip = true</text>

  <!-- Order Service -->
  <rect x="310" y="410" width="190" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="405" y="432" text-anchor="middle" font-size="10" font-weight="700" fill="#1e40af">Order Service</text>
  <text x="405" y="448" text-anchor="middle" font-size="9" fill="#374151">Node.js :4002</text>
  <text x="405" y="465" text-anchor="middle" font-size="8" fill="#6b7280">POST /orders (checkout)</text>
  <text x="405" y="477" text-anchor="middle" font-size="8" fill="#6b7280">GET /orders/:userId</text>
  <text x="405" y="489" text-anchor="middle" font-size="8" fill="#6b7280">POST /payments</text>
  <text x="405" y="505" text-anchor="middle" font-size="8" fill="#10b981">assign_public_ip = true</text>

  <!-- Frontend -->
  <rect x="520" y="410" width="180" height="110" rx="8" fill="#d1fae5" stroke="#10b981" stroke-width="1.5"/>
  <text x="610" y="432" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Frontend</text>
  <text x="610" y="448" text-anchor="middle" font-size="9" fill="#374151">React + Nginx :80</text>
  <text x="610" y="465" text-anchor="middle" font-size="8" fill="#6b7280">Static SPA</text>
  <text x="610" y="477" text-anchor="middle" font-size="8" fill="#6b7280">Product browsing</text>
  <text x="610" y="489" text-anchor="middle" font-size="8" fill="#6b7280">Cart + Checkout UI</text>
  <text x="610" y="505" text-anchor="middle" font-size="8" fill="#10b981">assign_public_ip = true</text>

  <!-- DB Init Task -->
  <rect x="100" y="540" width="190" height="55" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="195" y="562" text-anchor="middle" font-size="9" font-weight="600" fill="#92400e">🗄️ db-init (one-time task)</text>
  <text x="195" y="578" text-anchor="middle" font-size="8" fill="#6b7280">Loads schema + seed data</text>
  <text x="195" y="590" text-anchor="middle" font-size="8" fill="#6b7280">Runs once → exits</text>

  <!-- CloudWatch -->
  <rect x="310" y="540" width="190" height="55" rx="8" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="405" y="562" text-anchor="middle" font-size="9" font-weight="600" fill="#9d174d">📊 CloudWatch Logs</text>
  <text x="405" y="578" text-anchor="middle" font-size="8" fill="#6b7280">/ecs/shop-easy</text>
  <text x="405" y="590" text-anchor="middle" font-size="8" fill="#6b7280">3-day retention</text>

  <!-- RDS -->
  <rect x="780" y="410" width="240" height="220" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
  <text x="900" y="435" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">🗄️ Amazon RDS</text>
  <text x="900" y="455" text-anchor="middle" font-size="10" fill="#374151">MySQL 8.0 (db.t3.micro)</text>
  <text x="900" y="475" text-anchor="middle" font-size="9" fill="#6b7280">shop-easy-db</text>
  <text x="900" y="500" text-anchor="middle" font-size="8" fill="#6b7280">Tables:</text>
  <text x="900" y="515" text-anchor="middle" font-size="8" fill="#6b7280">• products (10 items)</text>
  <text x="900" y="528" text-anchor="middle" font-size="8" fill="#6b7280">• users, cart_items</text>
  <text x="900" y="541" text-anchor="middle" font-size="8" fill="#6b7280">• orders, order_items</text>
  <text x="900" y="554" text-anchor="middle" font-size="8" fill="#6b7280">• payments</text>
  <text x="900" y="580" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">🔒 publicly_accessible = false</text>
  <text x="900" y="596" text-anchor="middle" font-size="8" fill="#6b7280">Only ECS SG can access :3306</text>
  <text x="900" y="620" text-anchor="middle" font-size="8" fill="#6b7280">Private — no internet exposure</text>

  <!-- Arrows ALB to services -->
  <line x1="680" y1="340" x2="195" y2="410" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="730" y1="340" x2="405" y2="410" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="780" y1="340" x2="610" y2="410" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>

  <!-- Arrows services to RDS -->
  <line x1="290" y1="465" x2="780" y2="500" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrO)"/>
  <line x1="500" y1="465" x2="780" y2="520" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrO)"/>
  <line x1="290" y1="568" x2="780" y2="545" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrO)"/>

  <!-- Legend -->
  <rect x="830" y="260" width="200" height="80" rx="8" fill="white" stroke="#e2e8f0"/>
  <text x="850" y="278" font-size="9" font-weight="600" fill="#374151">Cost: ~$57/month</text>
  <text x="850" y="294" font-size="8" fill="#6b7280">ECS (3 tasks): ~$25</text>
  <text x="850" y="306" font-size="8" fill="#6b7280">RDS db.t3.micro: ~$15</text>
  <text x="850" y="318" font-size="8" fill="#6b7280">ALB: ~$16 | ECR+S3: ~$1</text>
  <text x="850" y="332" font-size="8" fill="#10b981">No NAT Gateway (saves $32)</text>
</svg>
